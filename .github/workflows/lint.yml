name: Lint

"on":
  workflow_call:
    inputs:
      git_ref:
        description: Git ref to check out.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to check out.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9467f3db8f5f3c942629468981c4a2a67d0caa64  # v2.6.1
        with:
          include-first-party: 'true'
          write-job-summary: 'on-failure-only'

      - name: "Test: Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Test: Remove Python yq and keep using Go yq"
        run: |
          python -m pip uninstall -y yq

      - name: "Test: Install lint deps"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: "Test: Run lint.sh"
        run: scripts/lint.sh
