name: Lint

"on":
  workflow_call:
    inputs:
      git_ref:
        description: Git ref to check out.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to check out.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9f5dad6bb6148bd29ff0d874de6a8cc70af08fa9  # v2.6.2
        with:
          include-first-party: 'true'
          write-job-summary: 'on-failure-only'

      - name: "Test: Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.x"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Test: Remove Python yq and keep using Go yq"
        run: |
          python -m pip uninstall -y yq

      - name: "Test: Install lint deps"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: "Test: Run lint.sh"
        run: scripts/lint.sh
