name: GHCR Cleanup

"on":
  # Weekly on Wednesday at 03:41 UTC
  schedule:
    - cron: "41 3 * * 3"
  workflow_dispatch:
    inputs:
      older-than-days:
        description: "Retention window in days for cleanup"
        type: number
        default: 30
      keep-n-tagged:
        description: "How many tags to keep"
        type: number
        default: 3
      dry-run:
        description: "Run in dry-run mode (recommended first)"
        type: boolean
        default: true
      log-level:
        description: "Action log level"
        type: choice
        options:
          - info
          - debug
          - warn
          - error
        default: info

env:
  # Repo-specific high-level knobs
  PACKAGE_NAME: aicage-image-util

permissions:
  contents: read

jobs:
  prepare-retention-regex:
    name: Prepare retention regex
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.config.outputs.package_name }}
      exclude_tags_regex: ${{ steps.regex.outputs.exclude_tags_regex }}
    steps:
      - name: Export config
        id: config
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "package_name=${PACKAGE_NAME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build exclude-tags-regex
        id: regex
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          # Repo-specific release source:
          mapfile -t TAGS < <(git tag -l --sort=-version:refname)

          if (( ${#TAGS[@]} == 0 )); then
            echo "No release tags found. This must be non-empty." >&2
            exit 1
          fi

          ESCAPED_TAGS=()
          for tag in "${TAGS[@]}"; do
            # Escape regex metacharacters in tag names.
            escaped="$(printf '%s' "${tag}" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g')"
            ESCAPED_TAGS+=("${escaped}")
          done
          RELEASE_LIST="$(IFS='|'; echo "${ESCAPED_TAGS[*]}")"

          EXCLUDE_TAGS_REGEX="^(agent-version|${RELEASE_LIST})$"

          {
            echo "exclude_tags_regex=${EXCLUDE_TAGS_REGEX}"
          } | tee /dev/stderr >> "${GITHUB_OUTPUT}"

  ghcr-cleanup:
    name: GHCR cleanup
    needs: prepare-retention-regex
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old images
        uses: ghcr-manager/ghcr-cleanup-manager@e9871d03c6e48d4bbb24a8132872218a73288a4a  # v1.1.6
        with:
          command: cleanup
          token: ${{ secrets.GHCR_CLEANUP_PAT != '' && secrets.GHCR_CLEANUP_PAT || github.token }}
          owner: ${{ github.repository_owner }}
          package: ${{ needs.prepare-retention-regex.outputs.package_name }}
          upload-artifacts: true
          use-regex: true
          delete-tags: '.*'
          keep-n-tagged: ${{ github.event_name == 'workflow_dispatch' && inputs.keep-n-tagged || 3 }}
          exclude-tags: ${{ needs.prepare-retention-regex.outputs.exclude_tags_regex }}
          older-than: ${{ github.event_name == 'workflow_dispatch' && inputs.older-than-days || 30 }} days
          delete-untagged: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
          log-level: ${{ github.event_name == 'workflow_dispatch' && inputs.log-level || 'info' }}
