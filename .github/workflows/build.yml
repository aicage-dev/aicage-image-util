name: Build Image Util
run-name: Build image util (${{ github.ref_name }})

"on":
  schedule:
    # Weekly on Tuesday at 02:23 UTC
    - cron: "23 2 * * 2"
  push:
    tags:
      - "*"
  workflow_dispatch: {}

concurrency:
  group: build-image-util-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      GIT_REF: ${{ steps.ref.outputs.GIT_REF }}
      UNIQUE: ${{ steps.ref.outputs.UNIQUE }}
      VERSION_TAG: ${{ steps.ref.outputs.VERSION_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve git ref
        id: ref
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            git fetch --tags
            GIT_REF="$(git tag --list --sort=version:refname | tail -n 1)"
            if [[ -z "${GIT_REF}" ]]; then
              echo "Git tag is empty for latest release" >&2
              exit 1
            fi
            VERSION_TAG="${GIT_REF}"
          else
            GIT_REF="${GITHUB_REF_NAME}"
            VERSION_TAG="${GITHUB_SHA::7}"
          fi
          {
            echo "GIT_REF=${GIT_REF}"
            echo "UNIQUE=${GITHUB_SHA::7}-$(uuidgen)"
            echo "VERSION_TAG=${VERSION_TAG}"
          } | tee /dev/stderr >> "$GITHUB_OUTPUT"

  lint:
    needs: resolve-ref
    uses: ./.github/workflows/lint.yml
    with:
      git_ref: ${{ needs.resolve-ref.outputs.GIT_REF }}

  build:
    name: "${{ matrix.arch }}: Build and test image"
    runs-on: ${{ matrix.runner }}
    needs: [resolve-ref, lint]
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH_SUFFIX: ${{ matrix.arch }}
      AICAGE_VERSION: ${{ needs.resolve-ref.outputs.GIT_REF }}
      IMAGE_NAME: ghcr.io/aicage/aicage-image-util
      IMAGE_TEST_TAG: ${{ needs.resolve-ref.outputs.UNIQUE }}-${{ matrix.arch }}-test
    outputs:
      CREATED: ${{ steps.oci.outputs.created }}
      INDEX_DIGEST_amd64: ${{ steps.out-amd64.outputs.INDEX_DIGEST }}
      INDEX_DIGEST_arm64: ${{ steps.out-arm64.outputs.INDEX_DIGEST }}
      REVISION: ${{ steps.oci.outputs.revision }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-ref.outputs.GIT_REF }}

      - name: Resolve OCI labels
        id: oci
        run: |
          set -euo pipefail
          {
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "revision=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          driver: docker-container

      - name: Log in to the container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test image tag
        id: build_image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          platforms: ${{ env.PLATFORM }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TEST_TAG }}
          labels: |
            org.opencontainers.image.description=Utility image for aicage runtime tasks
            org.opencontainers.image.revision=${{ steps.oci.outputs.revision }}
            org.opencontainers.image.created=${{ steps.oci.outputs.created }}
            org.opencontainers.image.version=${{ needs.resolve-ref.outputs.VERSION_TAG }}

      - name: Remove test tag on image
        uses: ghcr-manager/ghcr-untag-action@ab3e570fdd6d67415ed325bedf29f3ec0777add1  # v1.0.6
        with:
          token: ${{ github.token }}
          owner: aicage
          package: aicage-image-util
          tags: ${{ env.IMAGE_TEST_TAG }}

      - name: "Test: Verify OCI labels on util image"
        env:
          EXPECTED_REVISION: ${{ steps.oci.outputs.revision }}
          EXPECTED_CREATED: ${{ steps.oci.outputs.created }}
          EXPECTED_VERSION: ${{ needs.resolve-ref.outputs.VERSION_TAG }}
          BUILT_IMAGE_DIGEST: ${{ steps.build_image.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE_NAME}@${BUILT_IMAGE_DIGEST}"
          docker image inspect "${IMAGE_NAME}@${BUILT_IMAGE_DIGEST}" \
            | jq -e \
              --arg expected_revision "$EXPECTED_REVISION" \
              --arg expected_created "$EXPECTED_CREATED" \
              --arg expected_version "$EXPECTED_VERSION" '
              .[0].Config.Labels["org.opencontainers.image.description"]
                == "Utility image for aicage runtime tasks"
              and .[0].Config.Labels["org.opencontainers.image.revision"] == $expected_revision
              and .[0].Config.Labels["org.opencontainers.image.created"] == $expected_created
              and .[0].Config.Labels["org.opencontainers.image.version"] == $expected_version
            ' >/dev/null

      - name: Export digest (amd64)
        id: out-amd64
        if: matrix.arch == 'amd64'
        env:
          INDEX_DIGEST: ${{ steps.build_image.outputs.digest }}
        run: |
          set -euo pipefail
          (
            echo "INDEX_DIGEST=${INDEX_DIGEST}"
          ) | tee /dev/stderr >> "$GITHUB_OUTPUT"

      - name: Export digest (arm64)
        id: out-arm64
        if: matrix.arch == 'arm64'
        env:
          INDEX_DIGEST: ${{ steps.build_image.outputs.digest }}
        run: |
          set -euo pipefail
          (
            echo "INDEX_DIGEST=${INDEX_DIGEST}"
          ) | tee /dev/stderr >> "$GITHUB_OUTPUT"

  multiarch:
    name: Run multi-arch sign/provenance/publish
    needs: [resolve-ref, build]
    permissions:
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Use multi-arch publish action
        id: publish
        uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260  # 0.2.1
        with:
          image_ref: ghcr.io/aicage/aicage-image-util
          tags: |
            ${{ needs.resolve-ref.outputs.VERSION_TAG }}
            agent-version
          platform_digests: |
            linux/amd64=${{ needs.build.outputs.INDEX_DIGEST_amd64 }}
            linux/arm64=${{ needs.build.outputs.INDEX_DIGEST_arm64 }}
          annotations: |
            org.opencontainers.image.title=aicage-image-util
            org.opencontainers.image.description=Utility image for aicage runtime tasks
            org.opencontainers.image.source=https://github.com/aicage/aicage-image-util
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ needs.build.outputs.REVISION }}
            org.opencontainers.image.created=${{ needs.build.outputs.CREATED }}
            org.opencontainers.image.version=${{ needs.resolve-ref.outputs.VERSION_TAG }}

      - name: Verify OCI annotations on published manifest
        env:
          EXPECTED_REVISION: ${{ needs.build.outputs.REVISION }}
          EXPECTED_CREATED: ${{ needs.build.outputs.CREATED }}
          EXPECTED_VERSION: ${{ needs.resolve-ref.outputs.VERSION_TAG }}
          MANIFEST_DIGEST: ${{ steps.publish.outputs.manifest_digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            --raw "ghcr.io/aicage/aicage-image-util@${MANIFEST_DIGEST}" \
            | jq -e \
              --arg expected_revision "$EXPECTED_REVISION" \
              --arg expected_created "$EXPECTED_CREATED" \
              --arg expected_version "$EXPECTED_VERSION" '
              .annotations["org.opencontainers.image.title"] == "aicage-image-util"
              and .annotations["org.opencontainers.image.description"]
                == "Utility image for aicage runtime tasks"
              and .annotations["org.opencontainers.image.source"]
                == "https://github.com/aicage/aicage-image-util"
              and .annotations["org.opencontainers.image.licenses"] == "Apache-2.0"
              and .annotations["org.opencontainers.image.revision"] == $expected_revision
              and .annotations["org.opencontainers.image.created"] == $expected_created
              and .annotations["org.opencontainers.image.version"] == $expected_version
            ' >/dev/null
